<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <title>Claudette — Periwinkle</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B6CDFF"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.0"/>
      <stop offset="0.15" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.85" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#bg)"/>
  <path d="M225 0 H799 Q1024 0 1024 225 V340 Q700 220 512 320 Q300 410 0 340 V225 Q0 0 225 0 Z"
        fill="#ffffff" fill-opacity="0.08"/>
  <g font-family="-apple-system, SF Pro Rounded, SF Pro Display, Helvetica Neue, Arial, sans-serif"
     font-weight="700" font-size="84" letter-spacing="6"
     fill="#FFFFFF" text-anchor="middle">
    <text x="512" y="270">CLAUDETTE</text>
  </g>
  <g filter="url(#glow)" transform="translate(0 60)">
    <path d="M100 520 L340 520 L420 360 L520 720 L600 460 L680 520 L924 520"
          fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="40"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(0 60)">
    <path d="M100 520 L340 520 L420 360 L520 720 L600 460 L680 520 L924 520"
          fill="none" stroke="url(#line)" stroke-width="26"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="924" cy="520" r="22" fill="#ffffff"/>
    <circle cx="100" cy="520" r="14" fill="#ffffff" fill-opacity="0.8"/>
