<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <title>Claudette — Tachometer</title>
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A2A2E"/>
      <stop offset="1" stop-color="#161618"/>
    </linearGradient>
    <linearGradient id="arc6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34C759"/>
      <stop offset="0.6" stop-color="#FF9F0A"/>
      <stop offset="1" stop-color="#FF453A"/>
    </linearGradient>
    <filter id="shadow6" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" in="SourceAlpha"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#bg6)"/>

  <!-- subtle top sheen -->
  <path d="M225 0 H799 Q1024 0 1024 225 V310 Q700 200 512 290 Q300 380 0 310 V225 Q0 0 225 0 Z"
        fill="#ffffff" fill-opacity="0.05"/>

  <g transform="translate(512 600)">
    <!-- gauge arc track -->
    <path d="M -320 0 A 320 320 0 0 1 320 0"
          fill="none" stroke="#3A3A3F" stroke-width="50" stroke-linecap="round"/>
    <!-- gauge arc colored -->
    <path d="M -320 0 A 320 320 0 0 1 320 0"
          fill="none" stroke="url(#arc6)" stroke-width="50" stroke-linecap="round"
          stroke-dasharray="1005.3 1005.3"/>

    <!-- tick marks -->
    <g stroke="#ffffff" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round">
      <line x1="-260" y1="-150" x2="-238" y2="-138" transform="rotate(-30)"/>
      <line x1="0" y1="-260" x2="0" y2="-238"/>
      <line x1="260" y1="-150" x2="238" y2="-138" transform="rotate(30)"/>
    </g>

    <!-- needle -->
    <g filter="url(#shadow6)" transform="rotate(35)">
      <path d="M -14 0 L 0 -300 L 14 0 Z" fill="#FFFFFF"/>
    </g>
    <circle r="36" fill="#FFFFFF"/>
    <circle r="16" fill="#0A84FF"/>
  </g>

  <!-- wordmark stub -->
  <g font-family="-apple-system, SF Pro Rounded, SF Pro Display, Helvetica Neue, Arial, sans-serif"
     font-weight="700" font-size="76" letter-spacing="2"
     fill="#FFFFFF" fill-opacity="0.75" text-anchor="middle">
    <text x="512" y="240">CLAUDETTE</text>
  </g>
</svg>
