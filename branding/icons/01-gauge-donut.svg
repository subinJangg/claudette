<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <title>Claudette — Gauge Donut (Blue)</title>
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7F8FA"/>
      <stop offset="1" stop-color="#E6EAF0"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5AC8FA"/>
      <stop offset="1" stop-color="#0A84FF"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" in="SourceAlpha"/>
      <feOffset dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#bg1)"/>

  <!-- subtle inner glow -->
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.6"/>

  <g transform="translate(512 512)" filter="url(#shadow1)">
    <!-- track ring -->
    <circle r="290" fill="none" stroke="#D6DCE4" stroke-width="64"/>
    <!-- progress ring 75% starting at top -->
    <circle r="290" fill="none" stroke="url(#ring1)" stroke-width="64" stroke-linecap="round"
            stroke-dasharray="1366.6 1822.1" transform="rotate(-90)"/>

    <!-- center pulse dot -->
    <circle r="46" fill="#0A84FF"/>
    <circle r="46" fill="none" stroke="#0A84FF" stroke-width="6" stroke-opacity="0.25" transform="scale(1.6)"/>
  </g>
</svg>
