<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <title>Claudette — Blob Friend</title>
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E9F3FF"/>
      <stop offset="1" stop-color="#BFD9FF"/>
    </linearGradient>
    <radialGradient id="blob5" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#5AC8FA"/>
      <stop offset="1" stop-color="#0A84FF"/>
    </radialGradient>
    <filter id="shadow5" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" in="SourceAlpha"/>
      <feOffset dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#bg5)"/>

  <!-- gauge arc behind blob -->
  <g transform="translate(512 540)" stroke-linecap="round" fill="none">
    <path d="M -340 0 A 340 340 0 1 1 340 0" stroke="#FFFFFF" stroke-width="40" stroke-opacity="0.7"/>
    <path d="M -340 0 A 340 340 0 0 1 240 -240" stroke="#0A84FF" stroke-width="40"/>
  </g>

  <g filter="url(#shadow5)">
    <!-- blob body (rounded squircle-ish) -->
    <path d="M312 460
             Q312 300 512 300
             Q712 300 712 460
             L712 680
             Q712 820 512 820
             Q312 820 312 680 Z"
          fill="url(#blob5)"/>

    <!-- eyes -->
    <g fill="#FFFFFF">
      <ellipse cx="442" cy="540" rx="32" ry="40"/>
      <ellipse cx="582" cy="540" rx="32" ry="40"/>
    </g>
    <g fill="#0A2540">
      <ellipse cx="450" cy="548" rx="14" ry="18"/>
      <ellipse cx="590" cy="548" rx="14" ry="18"/>
    </g>

    <!-- smile -->
    <path d="M462 650 Q512 690 562 650"
          stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" fill="none"/>

    <!-- forehead highlight -->
    <ellipse cx="430" cy="380" rx="80" ry="22" fill="#FFFFFF" fill-opacity="0.3"/>
  </g>
</svg>
