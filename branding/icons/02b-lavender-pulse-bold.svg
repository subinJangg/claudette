<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <title>Claudette — Lavender Pulse (Bold Wordmark)</title>
  <defs>
    <linearGradient id="bg2b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C7B8FF"/>
      <stop offset="1" stop-color="#7E5BEF"/>
    </linearGradient>
    <linearGradient id="line2b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.0"/>
      <stop offset="0.15" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.85" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="glow2b" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#bg2b)"/>

  <!-- top highlight -->
  <path d="M225 0 H799 Q1024 0 1024 225 V340 Q700 220 512 320 Q300 410 0 340 V225 Q0 0 225 0 Z"
        fill="#ffffff" fill-opacity="0.08"/>

  <!-- CLAUDETTE wordmark — bolder, larger -->
  <g font-family="-apple-system, SF Pro Rounded, SF Pro Display, Helvetica Neue, Arial, sans-serif"
     font-weight="800" font-size="110" letter-spacing="2"
     fill="#FFFFFF" text-anchor="middle">
    <text x="512" y="310">Claudette</text>
  </g>

  <!-- soft pulse glow -->
  <g filter="url(#glow2b)" transform="translate(0 100)">
    <path d="M100 520 L340 520 L420 360 L520 720 L600 460 L680 520 L924 520"
          fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="40"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- crisp pulse line -->
  <g transform="translate(0 100)">
    <path d="M100 520 L340 520 L420 360 L520 720 L600 460 L680 520 L924 520"
          fill="none" stroke="url(#line2b)" stroke-width="26"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="924" cy="520" r="22" fill="#ffffff"/>
    <circle cx="100" cy="520" r="14" fill="#ffffff" fill-opacity="0.8"/>
  </g>
</svg>
