<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <title>Claudette — Mug Mascot</title>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF6E9"/>
      <stop offset="1" stop-color="#F4D7B5"/>
    </linearGradient>
    <linearGradient id="mug3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EDEFF3"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" in="SourceAlpha"/>
      <feOffset dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#bg3)"/>

  <!-- steam -->
  <g stroke="#C9A37A" stroke-width="22" stroke-linecap="round" fill="none" opacity="0.55">
    <path d="M400 220 Q360 290 400 360 Q440 430 400 500"/>
    <path d="M520 180 Q480 260 520 340 Q560 420 520 500"/>
    <path d="M640 220 Q600 290 640 360 Q680 430 640 500"/>
  </g>

  <g filter="url(#shadow3)">
    <!-- handle -->
    <path d="M740 580 Q900 580 900 720 Q900 860 740 860"
          fill="none" stroke="url(#mug3)" stroke-width="56" stroke-linecap="round"/>
    <!-- mug body -->
    <rect x="220" y="540" width="540" height="360" rx="60" ry="60" fill="url(#mug3)"/>
    <!-- liquid line -->
    <rect x="252" y="590" width="476" height="18" rx="9" fill="#0A84FF" opacity="0.15"/>

    <!-- face -->
    <g fill="#1D1D1F">
      <circle cx="380" cy="720" r="22"/>
      <circle cx="600" cy="720" r="22"/>
    </g>
    <!-- smile -->
    <path d="M420 800 Q490 850 560 800"
          fill="none" stroke="#1D1D1F" stroke-width="20" stroke-linecap="round"/>
    <!-- cheek dots -->
    <circle cx="320" cy="780" r="16" fill="#FFB199" opacity="0.7"/>
    <circle cx="660" cy="780" r="16" fill="#FFB199" opacity="0.7"/>
  </g>
</svg>
