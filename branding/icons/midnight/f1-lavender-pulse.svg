<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <title>Claudette — Heartbeat</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3D3656"/>
      <stop offset="1" stop-color="#1A1426"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C7B8FF"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <!-- 풀-블리드 배경 -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- 라벤더 글로우 -->
  <g filter="url(#glow)">
    <path d="M 0 512 L 240 512 L 360 200 L 520 880 L 680 240 L 800 512 L 1024 512"
          fill="none" stroke="#A78BFA" stroke-opacity="0.6" stroke-width="110"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 메인 하트비트 라인 -->
  <path d="M 0 512 L 240 512 L 360 200 L 520 880 L 680 240 L 800 512 L 1024 512"
        fill="none" stroke="url(#line)" stroke-width="72"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
